name: MC pmmppp

on:
  workflow_dispatch:
  schedule:
    - cron: '0 */6 * * *'

jobs:
  minec-run:
    runs-on: ubuntu-latest

    steps:
    - name: Limpiar directorio anterior
      run: |
        echo "Limpiando directorios anteriores..."
        rm -rf Zyno2 2>/dev/null || true
        rm -rf avalon.zip 2>/dev/null || true
        sudo killall -9 bot2.py 2>/dev/null || true
        sudo killall -9 python3 2>/dev/null || true
        sudo killall -9 screen 2>/dev/null || true

    - name: Listo
      run: |
        echo "Listo"
        if ! git clone https://github.com/zynooooooo/Zyno2.git; then
          echo "❌ Error clonando, intentando clonado superficial..."
          git clone --depth 1 https://github.com/zynooooooo/Zyno2.git || exit 1
        fi

        cd Zyno2
        unzip avalon.zip
        echo "Listo"
        echo "Contenido:"
        ls -la

    - name: 🔧 Instalar herramientas esenciales
      run: |
        echo "Instalando herramientas..."
        sudo apt-get update
        pip install discord

    - name: Instalar dependencias de Python
      run: |
        cd Zyno2
        echo "Instalando dependencias de Python..."
        echo "Dependencias de Python instaladas"

    - name: Establecer variables de entorno (TOKEN)
      run: |
        echo "Estableciendo variable de entorno AVALON_KEY..."
        echo "AVALON_KEY=${{ secrets.AVALON_KEY }}" >> $GITHUB_ENV
        echo "Variable AVALON_KEY establecida"

    - name: Ejecutar bot
      run: |
        cd Zyno2
        echo "Ejecutando bot..."
        python3 avalon.py
        echo "bot ejecutado"
