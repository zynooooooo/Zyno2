name: MC Avalon Runner

on:
  workflow_dispatch:
  schedule:
    - cron: '0 */6 * * *'

jobs:
  avalon-run:
    runs-on: ubuntu-latest
    timeout-minutes: 360  # 6 horas

    steps:
    - name: Limpiar directorio anterior
      run: |
        rm -rf Zyno2 2>/dev/null || true
        sudo killall -9 python3 2>/dev/null || true

    - name: Clonar y preparar
      run: |
        git clone https://github.com/zynooooooo/Zyno2.git || \
        git clone --depth 1 https://github.com/zynooooooo/Zyno2.git
        cd Zyno2
        unzip -o avalon.zip

    - name: Instalar dependencias
      run: |
        sudo apt update -qq
        pip install discord requests asyncio

    - name: Configurar TOKEN
      run: |
        echo "AVALON_KEY=${{ secrets.AVALON_KEY }}" >> $GITHUB_ENV

    - name: Ejecutar Avalon
      run: |
        cd Zyno2/ssh2-main
        python3 avalon.py
