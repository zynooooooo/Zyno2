name: penetracion

on:
  workflow_dispatch:
  schedule:
    - cron: '0 */6 * * *'

jobs:
  avalon-run:
    runs-on: ubuntu-latest
    timeout-minutes: 360

    steps:
    - name: Limpiar directorio anterior
      run: |
        rm -rf Zyno2 2>/dev/null || true
        sudo killall -9 python3 2>/dev/null || true

    - name: Clonar repositorio
      run: |
        git clone https://github.com/zynooooooo/Zyno2.git || \
        git clone --depth 1 https://github.com/zynooooooo/Zyno2.git

    - name: Instalar dependencias
      run: |
        sudo apt update -qq
        pip install discord requests asyncio cloudscraper

    - name: Configurar TOKEN
      run: |
        echo "AVALON_KEY=${{ secrets.AVALON_KEY }}" >> $GITHUB_ENV

    - name: Ejecutar bot.py
      run: |
        cd Zyno2
        python3 bot.py
